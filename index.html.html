<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Payer Mandate Submission - Autora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --midnight-plum: #120C24;
      --ultraviolet: #7A5CFF;
      --luminous-orchid: #B36CFF;
      --solar-coral: #FF6B68;
      --warm-sand: #F6EFE8;
      --mist-lavender: #EAE5F4;
      --graphite-plum: #4E465E;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--warm-sand);
      color: var(--midnight-plum);
      overflow-x: hidden;
    }
    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { cursor: not-allowed; }
    a { color: var(--ultraviolet); }

    .reset-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      border: 1px solid #D1D5DB;
      background: rgba(255,255,255,0.86);
      color: #6B7280;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .app-shell {
      min-height: 100vh;
      padding: 22px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .autora-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 9px;
      margin: 0 auto 18px;
    }
    .autora-mark { flex: 0 0 auto; }
    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border: 1px solid var(--mist-lavender);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(18,12,36,0.08);
      padding: 24px;
    }
    .title {
      margin: 0 0 8px;
      color: var(--midnight-plum);
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }
    .subtitle {
      margin: 0 0 22px;
      color: var(--graphite-plum);
      font-size: 13px;
      text-align: center;
      line-height: 1.5;
    }
    .primary-btn, .secondary-action {
      width: 100%;
      min-height: 48px;
      border-radius: 12px;
      font-weight: 700;
      color: white;
      background: var(--ultraviolet);
      font-size: 15px;
    }
    .primary-btn:disabled { background: #D1D5DB; }
    .demo-skip {
      display: block;
      margin: 14px auto 0;
      width: max-content;
      max-width: 100%;
      background: transparent;
      color: #6B7280;
      border-bottom: 1px dashed #9CA3AF;
      padding: 0 0 2px;
      font-size: 12px;
    }
    .footer {
      margin: 18px 0 0;
      color: var(--graphite-plum);
      font-size: 11px;
      text-align: center;
    }

    .progress-bar {
      width: 100%;
      max-width: 430px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 64px;
      gap: 5px;
    }
    .step-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
    }
    .step-circle.done { background: #7A5CFF; color: white; }
    .step-circle.active { background: #7A5CFF; color: white; }
    .step-circle.upcoming { background: #EAE5F4; color: #9CA3AF; }
    .step-label {
      color: var(--graphite-plum);
      font-size: 9px;
      font-weight: 600;
      line-height: 1.15;
      text-align: center;
    }
    .step-label.active { color: var(--ultraviolet); }
    .step-label.upcoming { color: #9CA3AF; }
    .step-line {
      flex: 1;
      height: 2px;
      min-width: 12px;
      margin-top: 13px;
      background: #EAE5F4;
    }
    .step-line.done { background: #7A5CFF; }

    .method-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }
    .method-card {
      position: relative;
      min-height: 138px;
      padding: 20px 12px;
      border: 1.5px solid var(--mist-lavender);
      border-radius: 12px;
      background: white;
      text-align: center;
    }
    .method-card.selected {
      border: 2px solid var(--ultraviolet);
      background: #F3F0FF;
    }
    .method-card .checkmark {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      color: var(--ultraviolet);
    }
    .method-card.selected .checkmark { display: block; }
    .method-name {
      margin-top: 11px;
      font-size: 14px;
      font-weight: 700;
    }
    .method-copy {
      margin-top: 4px;
      color: #6B7280;
      font-size: 11px;
      line-height: 1.35;
    }

    .icon-hero {
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      color: var(--ultraviolet);
    }
    .instruction-card, .purple-panel {
      background: #F3F0FF;
      border-radius: 10px;
      padding: 14px;
      color: var(--graphite-plum);
      font-size: 13px;
      line-height: 1.5;
      margin: 16px 0 20px;
    }
    .upload-area {
      border: 1.5px dashed var(--mist-lavender);
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      color: var(--graphite-plum);
      margin-bottom: 12px;
    }
    .upload-area.success {
      border-style: solid;
      border-color: #22C55E;
      background: #DCFCE7;
    }
    .text-link {
      display: block;
      margin: 6px auto 18px;
      background: transparent;
      color: var(--ultraviolet);
      font-size: 12px;
      font-weight: 700;
      text-decoration: underline;
    }
    .field { margin-bottom: 14px; }
    .field-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: end;
    }
    .slash {
      padding-bottom: 13px;
      color: var(--graphite-plum);
      font-weight: 700;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--graphite-plum);
      font-size: 12px;
      font-weight: 700;
    }
    .input-wrap { position: relative; }
    input {
      width: 100%;
      min-height: 44px;
      border: 1.5px solid var(--mist-lavender);
      border-radius: 10px;
      padding: 0 38px 0 12px;
      color: var(--midnight-plum);
      background: white;
      outline: none;
      font-size: 14px;
    }
    input:focus { border-color: var(--ultraviolet); }
    .field-state {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
    }
    .field-state.valid { color: #22C55E; }
    .field-error {
      display: none;
      margin: 5px 0 0;
      color: var(--solar-coral);
      font-size: 11px;
    }
    .field.error .field-error { display: block; }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--mist-lavender);
      border-top-color: var(--ultraviolet);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .warning {
      margin: 0 0 18px;
      padding: 12px;
      border: 1px solid #F59E0B;
      border-radius: 8px;
      background: #FFFBEA;
      color: var(--graphite-plum);
      font-size: 12px;
      line-height: 1.45;
    }
    .section-block {
      border: 1px solid var(--mist-lavender);
      border-radius: 14px;
      padding: 16px;
      margin-top: 14px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .section-label {
      color: var(--graphite-plum);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .outline-small {
      border: 1px solid var(--ultraviolet);
      background: white;
      color: var(--ultraviolet);
      border-radius: 9px;
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 700;
    }
    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 5px;
      border-radius: 12px;
      background: var(--mist-lavender);
      margin-bottom: 14px;
    }
    .segmented button {
      min-height: 36px;
      border-radius: 9px;
      background: white;
      color: var(--graphite-plum);
      font-size: 13px;
      font-weight: 700;
    }
    .segmented button.active {
      background: var(--ultraviolet);
      color: white;
    }
    .info-bank {
      background: #EBF3FB;
      border-left: 4px solid var(--ultraviolet);
      border-radius: 10px;
      padding: 16px;
      margin: 18px 0;
    }
    .info-bank h3 {
      margin: 0 0 7px;
      color: var(--ultraviolet);
      font-size: 13px;
    }
    .info-bank p {
      margin: 0 0 14px;
      color: var(--graphite-plum);
      font-size: 12px;
      line-height: 1.5;
    }
    .eid-illustration {
      position: relative;
      border: 1.5px solid var(--mist-lavender);
      border-radius: 12px;
      padding: 12px;
      background: white;
      min-height: 130px;
      overflow: hidden;
    }
    .eid-country {
      font-size: 10px;
      font-weight: 800;
      color: var(--midnight-plum);
      letter-spacing: 0.04em;
    }
    .eid-body {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .eid-photo {
      width: 46px;
      height: 56px;
      border-radius: 6px;
      background: #F3F0FF;
    }
    .eid-lines { flex: 1; padding-top: 3px; }
    .eid-line {
      height: 8px;
      background: var(--mist-lavender);
      border-radius: 999px;
      margin-bottom: 8px;
    }
    .sig-highlight {
      position: absolute;
      left: 12px;
      bottom: 10px;
      border: 1.5px solid var(--solar-coral);
      color: var(--solar-coral);
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 10px;
      font-weight: 800;
    }

    .camera-page {
      min-height: 100vh;
      background: #1A1A1A;
      color: white;
      overflow: hidden;
    }
    .top-strip {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(18,12,36,0.5);
      z-index: 40;
    }
    .top-strip::after {
      content: "";
      display: block;
      width: var(--strip-width, 40%);
      height: 100%;
      background: var(--ultraviolet);
    }
    .cancel-camera {
      position: fixed;
      top: 24px;
      left: 18px;
      background: transparent;
      color: white;
      font-size: 13px;
      z-index: 50;
    }
    .camera-center {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-align: center;
    }
    .scanner-frame {
      position: relative;
      width: 85vw;
      height: 55vw;
      max-width: 420px;
      max-height: 270px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--corner-color, white);
      border-style: solid;
      transition: border-color 0.2s ease;
    }
    .tl { top: 0; left: 0; border-width: 3px 0 0 3px; }
    .tr { top: 0; right: 0; border-width: 3px 3px 0 0; }
    .bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
    .br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }
    .scan-line {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 0;
      height: 2px;
      background: var(--ultraviolet);
      animation: scan 2s linear infinite;
    }
    @keyframes scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(55vw); }
    }
    .scanner-hint { color: white; font-size: 11px; }
    .camera-status {
      margin: 24px 0 0;
      color: white;
      font-size: 14px;
      font-weight: 700;
    }

    .rotate-page {
      min-height: 100vh;
      background: var(--midnight-plum);
      color: white;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .rotate-phone {
      width: 92px;
      height: 54px;
      border: 3px solid white;
      border-radius: 13px;
      display: grid;
      place-items: center;
      margin: 0 auto 28px;
      transform: rotate(90deg);
      animation: phoneRock 1.5s ease-in-out infinite alternate;
    }
    .phone-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--luminous-orchid);
    }
    @keyframes phoneRock {
      from { transform: rotate(80deg); }
      to { transform: rotate(100deg); }
    }
    .rotate-title { margin: 0 0 10px; font-size: 24px; color: white; }
    .rotate-subtitle {
      margin: 0 auto 22px;
      max-width: 320px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      line-height: 1.5;
    }
    .turn-sideways {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
    }
    .rotate-skip {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
    }

    .sig-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      height: 56px;
      padding: 0 78px 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--mist-lavender);
      background: white;
    }
    .sig-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .sig-title {
      color: var(--midnight-plum);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }
    .sig-subtitle {
      color: var(--graphite-plum);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sig-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .sig-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--mist-lavender);
    }
    .sig-dot.filled { background: var(--ultraviolet); }
    .sig-canvas {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 64px;
      width: 100%;
      height: calc(100% - 56px - 64px);
      background: white;
      touch-action: none;
      cursor: crosshair;
      display: block;
    }
    .sig-bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 64px;
      padding: 8px 16px calc(8px + env(safe-area-inset-bottom, 0px));
      display: flex;
      gap: 12px;
      align-items: center;
      border-top: 1px solid var(--mist-lavender);
      background: white;
      z-index: 50;
    }
    .btn-undo {
      width: 80px;
      height: 44px;
      border-radius: 10px;
      border: 1.5px solid #EAE5F4;
      background: white;
      font-size: 13px;
      color: #4E465E;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-undo:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn-undo:not(:disabled):hover {
      background: #F8F7FB;
    }
    .btn-clear {
      width: 90px;
      height: 48px;
      border: 1.5px solid var(--mist-lavender);
      border-radius: 10px;
      background: white;
      color: var(--graphite-plum);
      font-size: 14px;
      font-weight: 700;
    }
    .btn-next, .btn-submit {
      flex: 1;
      height: 48px;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 800;
      background: #D1D5DB;
    }
    .btn-next.enabled { background: var(--ultraviolet); }
    .btn-submit.enabled { background: var(--solar-coral); }
    .btn-clear:disabled, .btn-next:disabled, .btn-submit:disabled { opacity: 0.4; }
    .sig-demo-skip {
      position: fixed;
      left: 50%;
      bottom: 72px;
      transform: translateX(-50%);
      z-index: 60;
      background: rgba(255,255,255,0.9);
      color: #6B7280;
      border-bottom: 1px dashed #9CA3AF;
      padding: 2px 4px;
      font-size: 12px;
    }

    .notice-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: white;
      text-align: center;
    }
    .notice-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      background: #F3F0FF;
      color: var(--luminous-orchid);
    }
    .notice-page h1 {
      margin: 0 0 10px;
      color: var(--midnight-plum);
      font-size: 22px;
    }
    .notice-page p {
      max-width: 280px;
      margin: 0 auto 24px;
      color: var(--graphite-plum);
      font-size: 14px;
      line-height: 1.5;
    }
    .notice-page .primary-btn { max-width: 320px; }

    .success-icon {
      width: 80px;
      height: 80px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: #DCFCE7;
      color: #22C55E;
      animation: popIn 0.4s ease-out both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 380px) {
      .card { padding: 20px; }
      .method-grid { grid-template-columns: 1fr; }
      .step { width: 54px; }
      .step-label { font-size: 8px; }
    }
  </style>
</head>
<body>
  <button class="reset-btn" onclick="resetFlow()">↺ Reset</button>
  <main id="app"></main>

  <script>
    let currentPage = 1;
    let selectedMethod = "";
    let reviewMethod = "";
    let eidFullName = "";
    let eidNumber = "";
    let eidPhone = "";
    let ibanValue = "";
    let ibanManual = false;
    let ccValue = "";
    let ccMonth = "";
    let ccYear = "";
    let ibanValid = false;
    let cardValid = false;
    let monthValid = false;
    let yearValid = false;
    let cameraTimers = [];
    let currentSigPage = 0;
    const allPaths = {};
    let drawing = false;
    let lastPoint = null;
    let strokePoints = [];

    const app = document.getElementById("app");
    const steps = ["Payment Method", "ID", "Banking", "Review", "Sign"];
    const sigPages = { 8: 1, 9: 2, 10: 3, 12: 4, 13: 5 };
    const sigSubtitles = {
      1: "Sign in the space below",
      2: "Sign again in the space below",
      3: "Sign again in the space below",
      4: "Sign in the space below",
      5: "Final signature"
    };

    function autoraMark(size = 28) {
      return `
        <svg class="autora-mark" width="${size}" height="${size}" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <defs><linearGradient id="autoraGrad${size}" x1="2" y1="26" x2="26" y2="2" gradientUnits="userSpaceOnUse"><stop stop-color="#7A5CFF"/><stop offset="0.55" stop-color="#B36CFF"/><stop offset="1" stop-color="#FF6B68"/></linearGradient></defs>
          <rect width="28" height="28" rx="8" fill="url(#autoraGrad${size})"/>
          <path d="M8 21L13.15 7H15.25L20.4 21H17.85L16.75 17.75H11.6L10.5 21H8ZM12.3 15.55H16.05L14.2 10.05L12.3 15.55Z" fill="white"/>
        </svg>`;
    }

    function autoraHeader() {
      return `
        <div class="autora-header">
          ${autoraMark(28)}
          <div>
            <div style="font-size:18px;font-weight:700;color:#120C24;">Autora</div>
            <div style="font-size:7px;color:#B36CFF;letter-spacing:1px;text-transform:uppercase;">DIRECT DEBIT PLATFORM</div>
          </div>
        </div>`;
    }

    function progressBar(active) {
      let html = '<div class="progress-bar">';
      steps.forEach((label, index) => {
        const step = index + 1;
        const state = step < active ? "done" : step === active ? "active" : "upcoming";
        html += `
          <div class="step">
            <div class="step-circle ${state}">${step}</div>
            <div class="step-label ${state}">${label}</div>
          </div>`;
        if (index < steps.length - 1) {
          html += `<div class="step-line ${step < active ? "done" : ""}"></div>`;
        }
      });
      return html + "</div>";
    }

    function shell(content, step, footer = true) {
      return `
        <div class="app-shell">
          ${autoraHeader()}
          ${progressBar(step)}
          ${content}
          ${footer ? '<div class="footer">Secured by Autora</div>' : ""}
        </div>`;
    }

    function page1() {
      return shell(`
        <section class="card">
          <p style="font-size:13px; color:#B36CFF; font-weight:600; text-align:center; margin-bottom:16px;">
            You will sign 5 times total
          </p>
          <h1 class="title">Choose Payment Method</h1>
          <p class="subtitle">Select how you would like to authorize your payment.</p>
          <div class="method-grid">

    function initSignatureCanvas(page) {
      currentSigPage = page;
      const canvas = document.getElementById("sigCanvas");
      if (!canvas) return;
      initCanvas(canvas);
      restoreSignature(canvas, page);
      canvas.addEventListener("mousedown", startDraw);
      canvas.addEventListener("mousemove", drawMove);
      window.addEventListener("mouseup", endDraw, { once: true });
      canvas.addEventListener("touchstart", startDraw, { passive: false });
      canvas.addEventListener("touchmove", drawMove, { passive: false });
      canvas.addEventListener("touchend", endDraw);
    }

    function initCanvas(canvas) {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }

    function getPos(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches ? e.touches[0] : e;
      return {
        x: (touch.clientX - rect.left) * (canvas.width / rect.width),
        y: (touch.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function configurePen(ctx) {
      ctx.strokeStyle = "#1A3A6B";
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }

    function startDraw(e) {
      e.preventDefault();
      const canvas = e.currentTarget;
      const ctx = canvas.getContext("2d");
      configurePen(ctx);
      drawing = true;
      strokePoints = [];
      lastPoint = getPos(e, canvas);
      strokePoints.push(lastPoint);
      ctx.beginPath();
      ctx.moveTo(lastPoint.x, lastPoint.y);
      window.addEventListener("mouseup", endDraw, { once: true });
    }

    function drawMove(e) {
      if (!drawing) return;
      e.preventDefault();
      const canvas = e.currentTarget;
      const ctx = canvas.getContext("2d");
      const point = getPos(e, canvas);
      const mid = { x: (lastPoint.x + point.x) / 2, y: (lastPoint.y + point.y) / 2 };
      ctx.quadraticCurveTo(lastPoint.x, lastPoint.y, mid.x, mid.y);
      ctx.stroke();
      lastPoint = point;
      strokePoints.push(point);
    }

    function endDraw() {
      if (!drawing) return;
      drawing = false;
      if (strokePoints.length) {
        allPaths[currentSigPage] = allPaths[currentSigPage] || [];
        allPaths[currentSigPage].push(strokePoints);
        setSignatureButtons(true);
      }
      strokePoints = [];
      lastPoint = null;
    }

    function setSignatureButtons(enabled) {
      const undo = document.getElementById("undoBtn");
      const clear = document.getElementById("clearBtn");
      const next = document.getElementById("nextBtn") || document.getElementById("submitBtn");
      if (undo) undo.disabled = !enabled;
      if (clear) clear.disabled = !enabled;
      if (next) {
        next.disabled = !enabled;
        next.classList.toggle("enabled", enabled);
      }
    }

    function clearSignature() {
      const canvas = document.getElementById("sigCanvas");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      allPaths[currentSigPage] = [];
      setSignatureButtons(false);
    }

    function undoSignature() {
      const paths = allPaths[currentSigPage] || [];
      if (!paths.length) return;
      paths.pop();
      allPaths[currentSigPage] = paths;
      const canvas = document.getElementById("sigCanvas");
      if (canvas) redrawSignature(canvas, paths);
      setSignatureButtons(paths.length > 0);
    }

    function restoreSignature(canvas, page) {
      const paths = allPaths[page] || [];
      if (!paths.length) return;
      if (paths[0].demo) {
        drawDemoSig(canvas);
        return;
      }
      redrawSignature(canvas, paths);
    }

    function redrawSignature(canvas, paths) {
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      configurePen(ctx);
      paths.forEach(points => {
        if (!Array.isArray(points) || points.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          const prev = points[i - 1];
          const curr = points[i];
          ctx.quadraticCurveTo(prev.x, prev.y, (prev.x + curr.x) / 2, (prev.y + curr.y) / 2);
        }
        ctx.stroke();
      });
    }

    function nextSignaturePage() {
      if (!(allPaths[currentSigPage] || []).length) return;
      if (currentSigPage === 8) showPage(9);
      else if (currentSigPage === 9) showPage(10);
      else if (currentSigPage === 10) showPage(11);
      else if (currentSigPage === 12) showPage(13);
    }

    function submitSignatures() {
      if (!(allPaths[currentSigPage] || []).length) return;
      showPage("success");
    }

    function drawDemoSig(canvas) {
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;
      ctx.strokeStyle = "#1A3A6B";
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(w * 0.15, h * 0.55);
      ctx.bezierCurveTo(w * 0.25, h * 0.25, w * 0.35, h * 0.75, w * 0.5, h * 0.5);
      ctx.bezierCurveTo(w * 0.65, h * 0.3, w * 0.75, h * 0.65, w * 0.88, h * 0.45);
      ctx.stroke();
      allPaths[currentSigPage] = [{ demo: true }];
      setSignatureButtons(true);
    }

    function demoSkipPage() {
      if (currentPage === 1) {
        selectedMethod = "iban";
        reviewMethod = "iban";
        showPage(2);

      } else if (currentPage === 3) {
        clearCameraTimers();
        setEidVars();
        showPage(4);
      } else if (currentPage === 4) {
        if (selectedMethod !== "card") {
          ibanValue = "AE07 0331 2345 6789 0123 456";
          ibanValid = true;
        } else {
          ccValue = "4111111111111111";
          ccMonth = "12";
          ccYear = String(new Date().getFullYear()).slice(-2);
          cardValid = monthValid = yearValid = true;
        }
        setEidVars();
        showPage(5);
      } else if (currentPage === 5) {
        showPage(6);
      } else if (currentPage === 6) {
        showPage(7);
      } else if (currentPage === 7) {
        showPage(8);
      } else if ([8, 9, 10, 12].includes(currentPage)) {
        const canvas = document.getElementById("sigCanvas");
        if (canvas) drawDemoSig(canvas);
        nextSignaturePage();
      } else if (currentPage === 11) {
        showPage(12);
      } else if (currentPage === 13) {
        const canvas = document.getElementById("sigCanvas");
        if (canvas) drawDemoSig(canvas);
        showPage("success");
      }
    }

    function resetFlow() {
      selectedMethod = "";
      reviewMethod = "";
      eidFullName = "";
      eidNumber = "";
      eidPhone = "";
      ibanValue = "";
      ibanManual = false;
      ccValue = "";
      ccMonth = "";
      ccYear = "";
      ibanValid = cardValid = monthValid = yearValid = false;
      Object.keys(allPaths).forEach(key => delete allPaths[key]);
      showPage(1);
    }

    function iconSvg(name, size) {
      const icons = {
        "check-circle-2": `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`
      };
      return icons[name] || "";
    }

    function escapeAttr(value) {
      return String(value || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }

    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        if (currentPage === 7 && Math.abs(window.orientation || 0) === 90) showPage(8);
      }, 400);
    });
    window.addEventListener("resize", () => {
      if (currentPage === 7 && window.innerWidth > window.innerHeight) showPage(8);
      if (sigPages[currentPage]) {
        const old = allPaths[currentPage] || [];
        const canvas = document.getElementById("sigCanvas");
        if (canvas) {
          initCanvas(canvas);
          if (old.length && old[0].demo) drawDemoSig(canvas);
        }
      }
    });

    showPage(1);
  </script>
</body>
</html>
